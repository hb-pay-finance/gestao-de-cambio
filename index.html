<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HB - PAY | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #c0c0c0; /* Prata da Logo */
            --bg-dark: #0a0a0a; 
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #888888;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; font-family: sans-serif;
            background: #050505; color: var(--text-main); overflow: hidden;
        }

        /* LOGIN */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); display: flex; justify-content: center; align-items: center; z-index: 10000;
        }
        .login-box {
            background: var(--card-bg); padding: 40px; border-radius: 20px;
            border: 1px solid var(--primary); text-align: center; width: 300px;
        }

        /* APP E SIDEBAR */
        #app { display: none; height: 100vh; grid-template-columns: 80px 1fr; }
        
        .sidebar {
            background: #000; border-right: 1px solid #222;
            display: flex; flex-direction: column; align-items: center; padding: 20px 0;
        }
        .nav-item { color: var(--text-dim); font-size: 1.5rem; margin: 25px 0; cursor: pointer; }
        .nav-item.active { color: var(--primary); }

        .main-container { padding: 30px; overflow-y: auto; }
        .card { background: var(--card-bg); border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #222; }

        input {
            background: #000; border: 1px solid #333; padding: 10px; border-radius: 8px; color: #fff; width: 80%; margin-bottom: 10px;
        }
        .btn { background: var(--primary); border: none; color: #000; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; color: var(--text-dim); border-bottom: 1px solid #333; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<div id="lock-screen">
    <div class="login-box">
        <h1 style="color: var(--primary); margin-bottom: 5px;">HB - PAY</h1>
        <p style="color: var(--text-dim); font-size: 0.8rem; margin-bottom: 20px;">SISTEMA DE GESTÃO</p>
        <input type="password" id="pass-input" placeholder="SENHA">
        <button class="btn" style="width: 88%;" onclick="login()">ENTRAR</button>
    </div>
</div>

<div id="app">
    <aside class="sidebar">
        <div class="nav-item active" onclick="tab('home', this)"><i class="fa-solid fa-house"></i></div>
        <div class="nav-item" onclick="tab('ops', this)"><i class="fa-solid fa-users"></i></div>
        <div class="nav-item" onclick="tab('config', this)"><i class="fa-solid fa-gear"></i></div>
    </aside>

    <main class="main-container">
        <section id="tab-home">
            <div class="card">
                <small style="color:var(--text-dim)">Saldo de Travas</small>
                <h1 id="total-brl">R$ 0,00</h1>
            </div>
            <div class="card" style="max-width: 300px;">
                <canvas id="meuGrafico"></canvas>
            </div>
        </section>

        <section id="tab-ops" class="hidden">
            <div class="card">
                <button class="btn" onclick="addCli()">+ Novo Cliente</button>
                <div id="lista-cli" style="margin-top: 15px;"></div>
            </div>
            <div id="area-cliente" class="hidden card">
                <h2 id="nome-cli">Nome</h2>
                <input type="text" id="in_u" placeholder="USDT">
                <input type="text" id="in_r" placeholder="Cotação">
                <button class="btn" onclick="lancar()">Lançar</button>
                <table>
                    <thead><tr><th>USDT</th><th>Rate</th><th>Total BRL</th></tr></thead>
                    <tbody id="corpo-tabela"></tbody>
                </table>
            </div>
        </section>

        <section id="tab-config" class="hidden">
            <div class="card">
                <h2>Configurações</h2>
                <button class="btn" onclick="localStorage.clear(); location.reload();">Resetar Tudo</button>
            </div>
        </section>
    </main>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('hb_db')) || { clientes: {} };
    let atual = null;
    let chart;

    function login() {
        if(document.getElementById('pass-input').value === '1881') {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('app').style.display = 'grid';
            renderHome();
        } else { alert("Senha incorreta"); }
    }

    function tab(id, el) {
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById('tab-' + id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        if(id === 'home') renderHome();
        if(id === 'ops') renderLista();
    }

    function addCli() {
        let n = prompt("Nome do cliente:");
        if(n) { 
            let id = 'c' + Date.now();
            db.clientes[id] = { nome: n, travas: [] };
            save(); renderLista();
        }
    }

    function renderLista() {
        let d = document.getElementById('lista-cli'); d.innerHTML = '';
        for(let id in db.clientes) {
            d.innerHTML += `<div onclick="setCli('${id}')" style="background:#222; padding:10px; border-radius:8px; margin-bottom:5px; cursor:pointer;">${db.clientes[id].nome}</div>`;
        }
    }

    function setCli(id) {
        atual = id;
        document.getElementById('area-cliente').classList.remove('hidden');
        document.getElementById('nome-cli').innerText = db.clientes[id].nome;
        renderTabela();
    }

    function lancar() {
        let u = parseFloat(document.getElementById('in_u').value);
        let r = parseFloat(document.getElementById('in_r').value);
        if(u && r) {
            db.clientes[atual].travas.push({u, r});
            save(); renderTabela();
            document.getElementById('in_u').value = ''; document.getElementById('in_r').value = '';
        }
    }

    function renderTabela() {
        let b = document.getElementById('corpo-tabela'); b.innerHTML = '';
        db.clientes[atual].travas.forEach(t => {
            b.innerHTML += `<tr><td>₮ ${t.u}</td><td>${t.r}</td><td>R$ ${(t.u*t.r).toLocaleString('pt-BR')}</td></tr>`;
        });
    }

    function renderHome() {
        let total = 0;
        for(let id in db.clientes) {
            db.clientes[id].travas.forEach(t => total += (t.u * t.r));
        }
        document.getElementById('total-brl').innerText = 'R$ ' + total.toLocaleString('pt-BR');
        
        const ctx = document.getElementById('meuGrafico').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, { type: 'doughnut', data: { datasets: [{ data: [total, 1], backgroundColor: ['#fff', '#222'], borderWidth: 0 }] } });
    }

    function save() { localStorage.setItem('hb_db', JSON.stringify(db)); }
</script>
</body>
</html>
