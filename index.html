<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HB - PAY | Silver Executive</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #c0c0c0; 
            --primary-glow: rgba(192, 192, 192, 0.3);
            --bg-dark: #0a0a0a; 
            --card-bg: rgba(26, 26, 26, 0.95);
            --text-main: #ffffff;
            --text-dim: #888888;
            --success: #e0e0e0;
            --grad-silver: linear-gradient(135deg, #e0e0e0 0%, #707070 100%);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1a1a1a, #050505);
            color: var(--text-main); overflow: hidden;
        }

        /* ANIMAÇÃO DE LOGIN (ÍCONES GIRANDO) */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); display: flex; justify-content: center; align-items: center; z-index: 10000;
        }
        .orbit-container {
            position: absolute; width: 400px; height: 400px;
            display: flex; justify-content: center; align-items: center;
        }
        .orbit-icon {
            position: absolute; font-size: 2rem; color: var(--primary);
            filter: drop-shadow(0 0 10px var(--primary-glow));
        }
        .usdt-orbit { animation: orbit1 10s linear infinite; }
        .brl-orbit { animation: orbit2 10s linear infinite; }

        @keyframes orbit1 {
            from { transform: rotate(0deg) translateX(170px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(170px) rotate(-360deg); }
        }
        @keyframes orbit2 {
            from { transform: rotate(180deg) translateX(170px) rotate(-180deg); }
            to { transform: rotate(540deg) translateX(170px) rotate(-540deg); }
        }

        .login-box {
            position: relative; background: var(--card-bg); padding: 50px; border-radius: 24px;
            border: 1px solid var(--primary); text-align: center; width: 320px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8); backdrop-filter: blur(15px); z-index: 10;
        }

        /* SIDEBAR E APP */
        #app { display: none; height: 100vh; grid-template-columns: 80px 1fr; }
        .sidebar {
            background: #000; border-right: 1px solid rgba(192, 192, 192, 0.1);
            display: flex; flex-direction: column; align-items: center; padding: 25px 0;
        }
        .nav-item {
            color: var(--text-dim); font-size: 1.4rem; margin: 22px 0; cursor: pointer; transition: 0.3s;
        }
        .nav-item:hover, .nav-item.active { color: var(--primary); }
        .nav-item.active { border-right: 3px solid var(--primary); width: 100%; }

        .main-container { padding: 40px; overflow-y: auto; }
        .card {
            background: var(--card-bg); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);
            padding: 25px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* TABELAS E BOTÕES */
        .btn-primary {
            background: var(--grad-silver); border: none; color: #000; padding: 12px 24px;
            border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px var(--primary-glow); }
        
        input {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 12px; border-radius: 10px; color: white; outline: none; margin: 5px;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 12px; color: var(--text-dim); border-bottom: 1px solid #333; }
        td { padding: 15px 12px; border-bottom: 1px solid #222; }

        .status-pill { padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; cursor: pointer; }
        .pill-pendente { background: #333; color: #888; }
        .pill-recebido { background: var(--primary); color: #000; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div id="lock-screen">
    <div class="orbit-container">
        <div class="orbit-icon usdt-orbit"><i class="fa-solid fa-coins"></i></div>
        <div class="orbit-icon brl-orbit"><i class="fa-solid fa-brazilian-real-sign"></i></div>
    </div>
    <div class="login-box">
        <h1 style="color: var(--primary); margin: 0; letter-spacing: 2px;">HB - PAY</h1>
        <p style="color: var(--text-dim); font-size: 0.7rem; margin-bottom: 30px; letter-spacing: 4px;">SILVER EDITION</p>
