<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HB - PAY | Silver Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #c0c0c0; /* Prata */
            --primary-glow: rgba(192, 192, 192, 0.2);
            --bg-dark: #0a0a0a; /* Carbono */
            --card-bg: rgba(25, 25, 25, 0.9);
            --text-main: #f5f5f5;
            --text-dim: #888888;
            --success: #e0e0e0; /* Cinza claro para sucesso */
            --danger: #444444; /* Cinza muito escuro para erro */
            --grad-silver: linear-gradient(135deg, #e0e0e0 0%, #707070 100%);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1a1a1a, #050505);
            color: var(--text-main); overflow: hidden;
        }

        /* ANIMAÇÃO DE LOGIN SILVER */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); display: flex; justify-content: center; align-items: center; z-index: 10000;
        }
        .orbit-container {
            position: absolute; width: 450px; height: 450px;
            display: flex; justify-content: center; align-items: center;
        }
        .orbit-icon {
            position: absolute; font-size: 2rem; color: var(--primary);
            filter: drop-shadow(0 0 8px var(--primary));
        }
        .usdt-orbit { animation: orbit1 10s linear infinite; }
        .brl-orbit { animation: orbit2 10s linear infinite; }

        @keyframes orbit1 {
            from { transform: rotate(0deg) translateX(190px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(190px) rotate(-360deg); }
        }
        @keyframes orbit2 {
            from { transform: rotate(180deg) translateX(190px) rotate(-180deg); }
            to { transform: rotate(540deg) translateX(190px) rotate(-540deg); }
        }

        .login-box {
            position: relative; background: var(--card-bg); padding: 50px; border-radius: 20px;
            border: 1px solid rgba(192, 192, 192, 0.2); text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.9); backdrop-filter: blur(25px); z-index: 10;
        }

        /* SIDEBAR CARBON */
        #app { display: none; height: 100vh; grid-template-columns: 80px 1fr; }
        .sidebar {
            background: #000000; border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; flex-direction: column; align-items: center; padding: 30px 0;
        }
        .nav-item {
            color: #444; font-size: 1.3rem; margin: 25px 0; cursor: pointer;
            transition: 0.3s; width: 100%; text-align: center;
        }
        .nav-item:hover, .nav-item.active { color: var(--primary); }
        .nav-item.active { border-right: 2px solid var(--primary); }

        .main-container { padding: 40px; overflow-y: auto; }
        .card {
            background: var(--card-bg); border-radius: 16px; border: 1px solid rgba(255,255,255,0.03);
            padding: 30px; margin-bottom: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }
        .card-title { font-size: 0.75rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; }

        /* INPUTS SILVER */
        input, select {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            padding: 14px; border-radius: 8px; color: white; font-family: 'Inter';
        }
        input:focus { border-color: var(--primary); }

        .btn-primary {
            background: var(--grad-silver); border: none; color: #000; padding: 14px 28px;
            border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .btn-primary:hover { transform: scale(1.02); filter: brightness(1.1); }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: var(--text-dim); border-bottom: 1px solid rgba(255,255,255,0.05); }
        td { padding: 18px 15px; border-bottom: 1px solid rgba(255,255,255,0.02); font-size: 0.9rem; }

        .status-pill { padding: 4px 10px; border-radius: 4px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; }
        .pill-pendente { background: #222; color: #666; }
        .pill-recebido { background: #eee; color: #000; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div id="lock-screen">
    <div class="orbit-container">
        <div class="orbit-icon usdt-orbit"><i class="fa-solid fa-coins"></i></div>
        <div class="orbit-icon brl-orbit"><i class="fa-solid fa-money-bill-transfer"></i></div>
    </div>
    <div class="login-box">
        <h1 style="margin: 0; font-weight: 800; color: var(--primary);">HB - PAY</h1>
        <p style="color: var(--text-dim); font-size: 0.7rem; margin-bottom: 30px; letter-spacing: 3px;">SILVER MANAGEMENT</p>
        <input type="password" id="pass-input" placeholder="ACCESS KEY" style="text-align: center; width: 220px;">
        <br><br>
        <button class="btn-primary" onclick="tryLogin()">LOGIN</button>
    </div>
</div>

<div id="app">
    <aside class="sidebar">
        <div class="nav-item active" onclick="switchTab('home', this)"><i class="fa-solid fa-gauge-high"></i></div>
        <div class="nav-item" onclick="switchTab('operacional', this)"><i class="fa-solid fa-vault"></i></div>
        <div class="nav-item" onclick="switchTab('financeiro', this)"><i class="fa-solid fa-file-invoice-dollar"></i></div>
        <div class="nav-item" onclick="switchTab('config', this)"><i class="fa-solid fa-screwdriver-wrench"></i></div>
    </aside>

    <main class="main-container">
        <section id="tab-home">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px;">
                <div>
                    <div class="card-title">Global Balance</div>
                    <div id="dash-saldo-geral" style="font-size: 3rem; font-weight: 800; letter-spacing: -2px;">R$ 0,00</div>
                </div>
                <div style="text-align: right;">
                    <div class="card-title">Mth Volume</div>
                    <div id="dash-volume-mes" style="font-size: 1.5rem; font-weight: 400; color: var(--text-dim);">R$ 0,00</div>
                </div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="card">
                    <div class="card-title">Liquidity USDT</div>
                    <div style="height: 180px;"><canvas id="usdtChart"></canvas></div>
                </div>
                <div class="card">
                    <div class="card-title">Accounts Payable</div>
                    <div id="dash-contas-pagar" style="font-size: 2.2rem; margin: 25px 0; font-weight: 600; color: var(--primary);">R$ 0,00</div>
                    <small style="color: #444;">Total pending BRL settlements.</small>
                </div>
            </div>
        </section>

        <section id="tab-operacional" class="hidden">
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px;">
                <div class="card" style="padding: 20px; margin: 0; background: #111;"><div class="card-title">Total Locked</div><div id="op-total-travas" style="font-weight: 600;">R$ 0,00</div></div>
                <div class="card" style="padding: 20px; margin: 0; background: #111;"><div class="card-title">Settled</div><div id="op-total-pago" style="color: var(--primary)">R$ 0,00</div></div>
                <div class="card" style="padding: 20px; margin: 0; border-top: 2px solid var(--primary);"><div class="card-title">Exposure</div><div id="op-saldo-devedor" style="color: var(--text-main)">R$ 0,00</div></div>
            </div>

            <div style="display: grid; grid-template-columns: 260px 1fr; gap: 25px;">
                <div class="card">
                    <div class="card-title">Entities</div>
                    <button class="btn-primary" style="width: 100%; margin: 15px 0; font-size: 0.7rem;" onclick="novoCliente()">+ REGISTER</button>
                    <div id="client-list"></div>
                </div>
                <div class="card">
                    <div class="card-header">
                        <div class="card-title" id="current-client-name">Select Entity</div>
                        <i class="fa-solid fa-print" style="cursor:pointer" onclick="window.print()"></i>
                    </div>
                    <div class="input-group">
                        <input type="text" id="in_usdt" placeholder="USDT Amount" oninput="maskMoney(this)">
                        <input type="text" id="in_rate" placeholder="Rate (5,2450)" oninput="maskCot4(this)">
                        <button class="btn-primary" onclick="addTrava()">FIX RATE</button>
                    </div>
                    <table id="table-travas">
                        <tbody id="body-travas"></tbody>
                    </table>
                    <div class="input-group" style="margin-top: 40px;">
                        <input type="text" id="pay_val" placeholder="Payment R$" oninput="maskMoney(this)">
                        <input type="text" id="pay_ref" placeholder="Memo/PIX" style="flex: 1;">
                        <button class="btn-primary" onclick="addPagamento()">SETTLE</button>
                    </div>
                    <div id="pagos-list"></div>
                </div>
            </div>
        </section>

        <section id="tab-financeiro" class="hidden">
            <div class="card">
                <div class="card-title">Admin Journal</div>
                <div class="input-group" style="margin-top: 20px;">
                    <input type="date" id="fin-date">
                    <select id="fin-cat" style="flex: 1;">
                        <option value="faturamento">Profit</option>
                        <option value="taxa_rede">Network Fee</option>
                    </select>
                    <input type="text" id="fin-val" placeholder="R$ 0,00" oninput="maskMoney(this)">
                    <button class="btn-primary" onclick="addFinanca()">POST</button>
                </div>
                <table id="table-fin" style="margin-top: 20px;"><tbody id="body-fin"></tbody></table>
            </div>
        </section>

        <section id="tab-config" class="hidden">
            <div class="card" style="max-width: 400px;">
                <div class="card-title">System Settings</div>
                <input type="password" id="new-pass" placeholder="New Security Key" style="width: 100%; margin: 20px 0;">
                <button class="btn-primary" style="width: 100%;" onclick="saveConfig()">UPDATE KEY</button>
                <button class="btn-primary" style="width: 100%; margin-top: 20px; background: #222; color: #fff;" onclick="resetSystem()">WIPE ALL DATA</button>
            </div>
        </section>
    </main>
</div>

<script>
    // Toda a lógica de script permanece a mesma da versão anterior, 
    // apenas garantindo que os IDs de abas batam com os novos ícones.
    // ... (Mantendo as funções de maskMoney, maskCot4, addTrava, etc.)
    let SENHA = localStorage.getItem('hb_pass') || '1881';
    let db = JSON.parse(localStorage.getItem('hb_pay_v7_db')) || { clientes: {}, financas: [] };
    let atual = null;
    let usdtChart = null;

    function tryLogin() {
        if(document.getElementById('pass-input').value === SENHA) {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('app').style.display = 'grid';
            switchTab('home');
        } else { alert("Unauthorized"); }
    }

    function switchTab(tabId, el) {
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById('tab-' + tabId).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        if(el) el.classList.add('active');
        if(tabId === 'home') initDash();
        if(tabId === 'operacional') renderClientes();
        if(tabId === 'financeiro') renderFinancas();
    }

    function maskCot4(v) {
        let value = v.value.replace(/\D/g, "");
        if(value.length > 5) value = value.substring(0, 5);
        if(value.length > 1) { v.value = value.substring(0, 1) + "," + value.substring(1); } else { v.value = value; }
    }

    function maskMoney(v) {
        let value = v.value.replace(/\D/g, "");
        v.value = (value / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
    }

    function parseVal(str) { return parseFloat(str.replace(/\./g, '').replace(',', '.')); }

    function addTrava() {
        if(!atual) return;
        const u = parseVal(document.getElementById('in_usdt').value);
        const r = parseVal(document.getElementById('in_rate').value);
        if(u && r) {
            db.clientes[atual].travas.push({ usdt: u, rate: r, status: 'pendente' });
            save(); renderOperacional();
            document.getElementById('in_usdt').value = ''; document.getElementById('in_rate').value = '';
        }
    }

    function addPagamento() {
        if(!atual) return;
        const v = parseVal(document.getElementById('pay_val').value);
        const ref = document.getElementById('pay_ref').value || "PIX";
        if(v) {
            db.clientes[atual].pagos.push({ valor: v, ref: ref });
            save(); renderOperacional();
            document.getElementById('pay_val').value = ''; document.getElementById('pay_ref').value = '';
        }
    }

    function renderOperacional() {
        const body = document.getElementById('body-travas');
        const list = document.getElementById('pagos-list');
        body.innerHTML = ''; list.innerHTML = '';
        const c = db.clientes[atual];
        let travasTotal = 0, pagoTotal = 0;

        c.travas.forEach((t, i) => {
            let total = t.usdt * t.rate;
            travasTotal += total;
            body.innerHTML += `<tr>
                <td style="color:#fff">₮ ${t.usdt.toLocaleString('pt-BR')}</td>
                <td style="color:#666">${t.rate.toFixed(4).replace('.', ',')}</td>
                <td>R$ ${total.toLocaleString('pt-BR')}</td>
                <td><span class="status-pill pill-${t.status}" onclick="toggleStatus(${i})">${t.status}</span></td>
                <td><i class="fa-solid fa-trash-can" onclick="delTrava(${i})" style="cursor:pointer;opacity:0.2"></i></td>
            </tr>`;
        });

        c.pagos.forEach((p, i) => {
            pagoTotal += p.valor;
            list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:12px; background:rgba(255,255,255,0.02); border-radius:8px; margin-top:8px; border:1px solid rgba(255,255,255,0.05)">
                <span><b>R$ ${p.valor.toLocaleString('pt-BR')}</b> <small style="opacity:0.3; margin-left:10px;">${p.ref}</small></span>
                <i class="fa-solid fa-circle-xmark" onclick="delPago(${i})" style="cursor:pointer; opacity:0.3"></i>
            </div>`;
        });

        document.getElementById('op-total-travas').innerText = `R$ ${travasTotal.toLocaleString('pt-BR')}`;
        document.getElementById('op-total-pago').innerText = `R$ ${pagoTotal.toLocaleString('pt-BR')}`;
        document.getElementById('op-saldo-devedor').innerText = `R$ ${(travasTotal - pagoTotal).toLocaleString('pt-BR')}`;
    }

    function renderClientes() {
        const list = document.getElementById('client-list'); list.innerHTML = '';
        for(let id in db.clientes) {
            list.innerHTML += `<div class="nav-item" style="font-size:0.75rem; padding:12px; border-radius:8px; background:${id===atual?'#fff':'rgba(255,255,255,0.03)'}; color:${id===atual?'#000':'#666'}; margin-bottom:8px; cursor:pointer;" onclick="selecionarCliente('${id}')">
                ${db.clientes[id].nome}
            </div>`;
        }
    }

    function initDash() {
        let saldoGeral = 0, volMes = 0, usdtRec = 0, usdtPend = 0, devedorTotal = 0;
        for(let id in db.clientes) {
            let clTrava = 0, clPago = 0;
            db.clientes[id].travas.forEach(t => { 
                let v = t.usdt * t.rate; clTrava += v;
                if(t.status==='recebido') usdtRec += t.usdt; else usdtPend += t.usdt;
            });
            db.clientes[id].pagos.forEach(p => clPago += p.valor);
            saldoGeral += (clPago - clTrava);
            if(clTrava > clPago) devedorTotal += (clTrava - clPago);
        }
        db.financas.forEach(f => { if(f.cat==='faturamento') volMes += f.valor; });
        document.getElementById('dash-saldo-geral').innerText = `R$ ${saldoGeral.toLocaleString('pt-BR')}`;
        document.getElementById('dash-volume-mes').innerText = `R$ ${volMes.toLocaleString('pt-BR')}`;
        document.getElementById('dash-contas-pagar').innerText = `R$ ${devedorTotal.toLocaleString('pt-BR')}`;
        updateChart(usdtRec, usdtPend);
    }

    function updateChart(rec, pend) {
        if(usdtChart) usdtChart.destroy();
        const ctx = document.getElementById('usdtChart').getContext('2d');
        usdtChart = new Chart(ctx, { type: 'doughnut', data: { labels: ['Rec', 'Pend'], datasets: [{ data: [rec, pend], backgroundColor: ['#fff', '#222'], borderWidth: 0 }] }, options: { cutout: '85%', plugins: { legend: { display: false } } } });
    }

    function save() { localStorage.setItem('hb_pay_v7_db', JSON.stringify(db)); }
    function toggleStatus(i) { db.clientes[atual].travas[i].status = (db.clientes[atual].travas[i].status === 'pendente') ? 'recebido' : 'pendente'; save(); renderOperacional(); }
    function delTrava(i) { db.clientes[atual].travas.splice(i, 1); save(); renderOperacional(); }
    function delPago(i) { db.clientes[atual].pagos.splice(i, 1); save(); renderOperacional(); }
    function selecionarCliente(id) { atual = id; document.getElementById('current-client-name').innerText = db.clientes[id].nome; renderOperacional(); }
    function renderFinancas() {
        const b = document.getElementById('body-fin'); b.innerHTML = '';
        db.financas.forEach(f => { b.innerHTML += `<tr><td>${f.data}</td><td>${f.cat}</td><td>R$ ${f.valor.toLocaleString('pt-BR')}</td></tr>`; });
    }
    function saveConfig() { const p = document.getElementById('new-pass').value; if(p) { SENHA = p; localStorage.setItem('hb_pass', p); alert("Key Updated"); } }
    function resetSystem() { if(confirm("Wipe all?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
